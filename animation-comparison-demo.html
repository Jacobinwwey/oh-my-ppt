<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animation Comparison Demo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0f172a; color: #e2e8f0; font-family: -apple-system, 'Segoe UI', sans-serif; padding: 40px; min-height: 100vh; }
h1 { text-align: center; font-size: 28px; margin-bottom: 8px; color: #f1f5f9; }
.subtitle { text-align: center; color: #94a3b8; margin-bottom: 32px; font-size: 14px; }

.controls { text-align: center; margin-bottom: 32px; }
.controls button { background: #3b82f6; color: white; border: none; padding: 12px 32px; border-radius: 8px; font-size: 16px; cursor: pointer; margin: 0 8px; }
.controls button:hover { background: #2563eb; }
.controls button.secondary { background: #6366f1; }
.controls button.secondary:hover { background: #4f46e5; }

.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; max-width: 1200px; margin: 0 auto; }
.card { background: #1e293b; border-radius: 12px; padding: 24px; border: 1px solid #334155; }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.card-title { font-size: 18px; font-weight: 600; color: #f8fafc; }
.card-badge { font-size: 11px; padding: 3px 10px; border-radius: 12px; font-weight: 600; text-transform: uppercase; }
.badge-entrance { background: #065f46; color: #6ee7b7; }
.badge-emphasis { background: #7c2d12; color: #fb923c; }
.badge-lottie { background: #4c1d95; color: #c4b5fd; }

.anim-box {
  width: 100%;
  height: 80px;
  background: #334155;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 600;
  color: #f1f5f9;
  position: relative;
  overflow: hidden;
}

.section-title {
  grid-column: 1 / -1;
  font-size: 20px;
  font-weight: 700;
  color: #38bdf8;
  margin-top: 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid #334155;
}

.label-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 8px;
}
.label-row span {
  text-align: center;
  font-size: 12px;
  color: #64748b;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.compare-card {
  background: #1e293b;
  border-radius: 12px;
  padding: 20px;
  border: 1px solid #334155;
}
.compare-card .card-title { margin-bottom: 12px; }

.compare-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.compare-item {
  padding: 12px;
  border-radius: 8px;
}
.compare-item.native-side {
  background: #0f2b1e;
  border: 1px solid #14532d;
}
.compare-item.pptx-side {
  background: #1a1a2e;
  border: 1px solid #312e81;
}
.compare-item h4 {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}
.compare-item.native-side h4 { color: #4ade80; }
.compare-item.pptx-side h4 { color: #818cf8; }

.compare-item .anim-box {
  height: 60px;
  font-size: 14px;
}

.code-block {
  margin-top: 8px;
  font-size: 11px;
  color: #94a3b8;
  background: #0f172a;
  padding: 6px 8px;
  border-radius: 4px;
  font-family: 'Fira Code', monospace;
  line-height: 1.4;
  max-height: 60px;
  overflow: hidden;
}

.timing-indicator {
  position: absolute;
  bottom: 4px;
  right: 8px;
  font-size: 10px;
  color: #475569;
}

.lottie-container {
  width: 100%;
  height: 80px;
  border-radius: 8px;
  overflow: hidden;
  background: #334155;
}
</style>
</head>
<body>

<h1>Animation Comparison Demo</h1>
<p class="subtitle">
  左侧：HTML 原生动画（ppt-runtime.js / anime.js）&nbsp;&nbsp;|&nbsp;&nbsp;
  右侧：PPTX 导出效果说明（OOXML presetID）&nbsp;&nbsp;|&nbsp;&nbsp;
  底部：Lottie 自定义动画
</p>

<div class="controls">
  <button onclick="replayAll()">▶ 重播全部动画</button>
  <button class="secondary" onclick="resetAll()">⟲ 重置</button>
</div>

<div id="app" class="grid">
  <!-- Generated by JS -->
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>
<script>
// Simplified ppt-runtime animation logic
const ANIM_PRESETS = {
  'fade':       { opacity: [0, 1] },
  'fade-up':    { opacity: [0, 1], translateY: [20, 0] },
  'fade-down':  { opacity: [0, 1], translateY: [-20, 0] },
  'fade-left':  { opacity: [0, 1], translateX: [20, 0] },
  'fade-right': { opacity: [0, 1], translateX: [-20, 0] },
  'scale-in':   { opacity: [0, 1], scale: [0.85, 1] },
  'slide-up':   { opacity: [0, 1], translateY: [40, 0] },
  'slide-left': { opacity: [0, 1], translateX: [40, 0] },
  'pulse':      { scale: [1, 1.05, 1] },
  'shake':      { translateX: [0, -6, 6, -4, 4, -2, 2, 0] },
  'bounce':     { translateY: [0, -10, -4, 0] },
  'glow':       { opacity: [1, 0.7, 1] }
};

const PPTX_MAP = {
  'fade':       { presetID: 10, presetClass: 'entr', effect: 'p:animEffect filter="fade"', motion: false },
  'fade-up':    { presetID: 2, presetClass: 'entr', presetSubtype: 8, effect: 'p:animEffect filter="fade" + ppt_y #ppt_y+#ppt_h/2→#ppt_y', motion: true },
  'fade-down':  { presetID: 2, presetClass: 'entr', presetSubtype: 1, effect: 'p:animEffect filter="fade" + ppt_y #ppt_y-#ppt_h/2→#ppt_y', motion: true },
  'fade-left':  { presetID: 2, presetClass: 'entr', presetSubtype: 3, effect: 'p:animEffect filter="fade" + ppt_x #ppt_x+#ppt_w/2→#ppt_x', motion: true },
  'fade-right': { presetID: 2, presetClass: 'entr', presetSubtype: 2, effect: 'p:animEffect filter="fade" + ppt_x #ppt_x-#ppt_w/2→#ppt_x', motion: true },
  'scale-in':   { presetID: 31, presetClass: 'entr', effect: 'p:animScale 85000→100000 + p:animEffect filter="fade"', motion: false },
  'slide-up':   { presetID: 2, presetClass: 'entr', presetSubtype: 8, effect: 'p:animEffect filter="fade" + ppt_y #ppt_y+#ppt_h/2→#ppt_y', motion: true },
  'slide-left': { presetID: 2, presetClass: 'entr', presetSubtype: 3, effect: 'p:animEffect filter="fade" + ppt_x #ppt_x+#ppt_w/2→#ppt_x', motion: true },
  'pulse':      { presetID: 6, presetClass: 'emph', effect: 'p:animScale 100000→106000', motion: false },
  'shake':      { presetID: 6, presetClass: 'emph', effect: 'p:animScale 90000→108000', motion: false },
  'bounce':     { presetID: 6, presetClass: 'emph', effect: 'p:animScale 100000→106000', motion: false },
  'glow':       { presetID: 6, presetClass: 'emph', effect: 'p:animScale 100000→106000', motion: false }
};

const ENTRANCE_ANIMS = ['fade', 'fade-up', 'fade-down', 'fade-left', 'fade-right', 'scale-in', 'slide-up', 'slide-left'];
const EMPHASIS_ANIMS = ['pulse', 'shake', 'bounce', 'glow'];

const app = document.getElementById('app');

function buildCards(animTypes, badgeClass, sectionLabel) {
  let html = `<div class="section-title">${sectionLabel}</div>`;
  for (const type of animTypes) {
    const preset = PPTX_MAP[type];
    const isEmphasis = EMPHASIS_ANIMS.includes(type);
    html += `
    <div class="compare-card">
      <div class="card-title">${type} <span class="card-badge ${badgeClass}">${preset.presetClass}</span></div>
      <div class="compare-grid">
        <div class="compare-item native-side">
          <h4>HTML Preview (anime.js)</h4>
          <div class="anim-box" data-anim-type="${type}" id="html-${type}">
            ${type}
          </div>
          <div class="code-block">data-anim="${type}"</div>
        </div>
        <div class="compare-item pptx-side">
          <h4>PPTX Export (presetID=${preset.presetID}${preset.presetSubtype ? ' subtype=' + preset.presetSubtype : ''})</h4>
          <div class="anim-box" id="pptx-${type}" style="background: #1a1a2e;">
            <span style="color:#818cf8;">${preset.effect.split(' ').slice(0,3).join(' ')}</span>
          </div>
          <div class="code-block">presetID="${preset.presetID}" presetClass="${preset.presetClass}"${preset.presetSubtype ? ' presetSubtype="' + preset.presetSubtype + '"' : ''}<br>nodeType="withEffect"<br>p:set visibility + p:bldLst</div>
        </div>
      </div>
    </div>`;
  }
  return html;
}

app.innerHTML = buildCards(ENTRANCE_ANIMS, 'badge-entrance', '入场动画 Entrance Animations')
  + buildCards(EMPHASIS_ANIMS, 'badge-emphasis', '强调动画 Emphasis Animations')
  + `
  <div class="section-title">Lottie 自定义动画 (HTML Preview Only, PPTX 不可导出)</div>
  <div class="compare-card">
    <div class="card-title">Lottie 动画示例 <span class="card-badge badge-lottie">lottie</span></div>
    <div class="compare-grid">
      <div class="compare-item native-side">
        <h4>HTML Preview (Lottie runtime)</h4>
        <div class="lottie-container" id="lottie-demo">
          <div style="display:flex;align-items:center;justify-content:center;height:100%;color:#94a3b8;font-size:13px;">
            Lottie JSON 播放区域（需要实际 Lottie 文件 URL）
          </div>
        </div>
        <div class="code-block">data-anim="lottie" data-anim-lottie-src="...json"</div>
      </div>
      <div class="compare-item pptx-side">
        <h4>PPTX Export</h4>
        <div class="anim-box" style="background: #1a1a2e;">
          <span style="color:#ef4444;">✗ 无法导出</span>
        </div>
        <div class="code-block" style="color:#f87171;">Lottie JSON 无法映射到 OOXML presetID 体系<br>导出后为静态内容</div>
      </div>
    </div>
  </div>
  `;

function playAnimation(type, delay) {
  const el = document.getElementById('html-' + type);
  if (!el) return;

  const preset = ANIM_PRESETS[type];
  if (!preset) return;

  // Reset
  el.style.opacity = EMPHASIS_ANIMS.includes(type) ? '1' : '0';
  el.style.transform = '';

  const params = {};
  for (const [key, val] of Object.entries(preset)) {
    params[key] = val;
  }
  params.duration = 600;
  params.delay = delay;
  params.easing = 'easeOutCubic';

  anime({ targets: el, ...params });
}

function replayAll() {
  const allAnims = [...ENTRANCE_ANIMS, ...EMPHASIS_ANIMS];
  allAnims.forEach((type, i) => {
    playAnimation(type, i * 100);
  });
}

function resetAll() {
  const allAnims = [...ENTRANCE_ANIMS, ...EMPHASIS_ANIMS];
  allAnims.forEach(type => {
    const el = document.getElementById('html-' + type);
    if (!el) return;
    el.style.opacity = EMPHASIS_ANIMS.includes(type) ? '1' : '0';
    el.style.transform = '';
  });
}

// Auto-play on load
window.addEventListener('load', () => {
  setTimeout(replayAll, 500);
});
</script>
</body>
</html>
